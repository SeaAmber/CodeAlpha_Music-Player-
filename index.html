  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A music player built with JavaScript that lets users play, pause, and switch songs.">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"  href="assets/prayer.png">

  </head>
  <body>
    <main>
    <h1 class="banner">Jesus Loves You</h1>
    <div class="musicPlayer">
     <div class="songInfo">
      <h2 id="songTitle">Song Title</h2>
      <h3 id="artist">Artist Name</h3>
     </div>

  <audio id="songAudio"></audio>


  <div class="controls">
  <button id="previous">Prev</button>
  <button id="play">Play</button>
  <button id="next">Next</button>
  </div>


   <div class="progressContainer">
    <label for="progress">Progress</label>
      <input type="range" id="progress" value="0">
    </div>
    <div class="volumeContainer">
      <label for="volume">Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.01">
    </div>

<div class="playlist">
      <ul id="playlist"></ul>
    </div>
    </div>
<script src="app.js"></script>
 </main>
  </body>
  </html>
